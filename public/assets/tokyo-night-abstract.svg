<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070a12"/>
      <stop offset="45%" stop-color="#080b14"/>
      <stop offset="100%" stop-color="#04060c"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.48" cy="0.28" r="0.56">
      <stop offset="0%" stop-color="#ff7a45" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#ea4a34" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0.72" cy="0.2" r="0.44">
      <stop offset="0%" stop-color="#4aa3ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2235"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <filter id="blur8" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="windowGrid" width="38" height="24" patternUnits="userSpaceOnUse">
      <rect width="1" height="24" fill="#ffffff" fill-opacity="0.05"/>
      <rect width="38" height="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#warm)"/>
  <rect width="1920" height="1080" fill="url(#cool)"/>

  <g opacity="0.72">
    <rect x="-120" y="110" width="500" height="620" fill="#0b101b"/>
    <rect x="-120" y="110" width="500" height="620" fill="url(#windowGrid)"/>
    <rect x="1540" y="120" width="500" height="610" fill="#0a0f1a"/>
    <rect x="1540" y="120" width="500" height="610" fill="url(#windowGrid)"/>
  </g>

  <g opacity="0.44" filter="url(#blur8)">
    <circle cx="440" cy="280" r="86" fill="#ff4b39"/>
    <circle cx="1510" cy="210" r="74" fill="#52a7ff"/>
    <circle cx="980" cy="340" r="120" fill="#ff8c5e"/>
  </g>

  <polygon points="960,510 1360,1080 560,1080" fill="url(#road)" opacity="0.92"/>
  <g opacity="0.65">
    <rect x="930" y="560" width="60" height="520" fill="#ffd4bf"/>
    <rect x="950" y="560" width="20" height="520" fill="#0a0e18"/>
    <rect x="950" y="560" width="20" height="40" fill="#ffd4bf"/>
    <rect x="950" y="640" width="20" height="42" fill="#ffd4bf"/>
    <rect x="950" y="724" width="20" height="44" fill="#ffd4bf"/>
    <rect x="950" y="814" width="20" height="48" fill="#ffd4bf"/>
    <rect x="950" y="906" width="20" height="52" fill="#ffd4bf"/>
  </g>

  <g opacity="0.56">
    <circle cx="640" cy="760" r="6" fill="#ff9e72"/>
    <circle cx="680" cy="778" r="5" fill="#9fd1ff"/>
    <circle cx="730" cy="792" r="5" fill="#ff8d85"/>
    <circle cx="790" cy="812" r="6" fill="#ffd497"/>
    <circle cx="850" cy="830" r="5" fill="#9fc8ff"/>
    <circle cx="910" cy="848" r="6" fill="#ff927e"/>
    <circle cx="1006" cy="854" r="6" fill="#ffb286"/>
    <circle cx="1068" cy="836" r="5" fill="#92c7ff"/>
    <circle cx="1132" cy="816" r="6" fill="#ff978f"/>
    <circle cx="1192" cy="796" r="5" fill="#ffe0b0"/>
    <circle cx="1248" cy="778" r="5" fill="#87bfff"/>
    <circle cx="1298" cy="760" r="6" fill="#ff9a7a"/>
  </g>

  <rect y="0" width="1920" height="1080" fill="url(#warm)" opacity="0.12"/>
</svg>
